{{- if .Values.listenerSet.enabled -}}
{{- $fullName := include "ontap-mcp.fullname" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "ontap-mcp.labels" . | nindent 4 }}
  {{- with .Values.listenerSet.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  listeners:
    {{- if .Values.listenerSet.http.enabled }}
    - name: http
      hostname: {{ .Values.listenerSet.hostname }}
      port: {{ .Values.listenerSet.http.port }}
      protocol: HTTP
    {{- end }}
    - name: https
      hostname: {{ .Values.listenerSet.hostname }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.listenerSet.tlsSecretName }}
  parentRef:
    {{- toYaml .Values.listenerSet.parentRef | nindent 4 }}
{{- end }}

name: Prune untagged images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 6' # every Saturday at midnight

jobs:
  purge-image:
    permissions:
      contents: read
      pull-requests: write
    name: Prune untagged images
    runs-on: ubuntu-latest
    environment: scheduled
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Delete all containers from repository without tags
        uses: step-security/delete-untagged-ghcr-action@bd5a3175057390795ee3d9bac9554f014365fa54 # v6.1.2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          package_name: 'ontap-mcp'
          untagged_only: true
          owner_type: user

      - name: Delete all Helm chart containers from repository without tags
        uses: step-security/delete-untagged-ghcr-action@bd5a3175057390795ee3d9bac9554f014365fa54 # v6.1.2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          package_name: "charts/ontap-mcp"
          untagged_only: true
          owner_type: user
